<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="ad-html">
<head th:replace="~{manager/fragments/admin-layout :: head('Feedback moderation')}"></head>
<body class="ad-body">
  <div class="ad-app">
    <aside th:replace="~{manager/fragments/sidebar-unified :: sidebar('feedback', ${managerRole})}"></aside>
    <div class="ad-main">
      <div class="ad-main-inner">
        <header class="ad-page-head">
          <h1>Feedback moderation</h1>
          <p class="ad-page-sub">Remove inappropriate course or instructor feedback entries.</p>
        </header>
        <p th:if="${param.removed}" class="ad-msg-ok">Entry removed.</p>
        <h2 class="ad-h2">Course feedback</h2>
        <div class="ad-table-wrap" th:if="${not #lists.isEmpty(courseFeedback)}" style="margin-bottom:2rem;">
          <table class="ad-table">
            <thead><tr><th>Course</th><th>Rating</th><th>Comments</th><th></th></tr></thead>
            <tbody>
              <tr th:each="f : ${courseFeedback}">
                <td th:text="${f.courseName}">—</td>
                <td th:text="${f.rating}">0</td>
                <td th:text="${f.comments}">—</td>
                <td>
                  <form th:action="@{/manager/feedback/course/{id}/delete(id=${f.id})}" method="post" style="margin:0;">
                    <button type="submit" class="ad-btn ad-btn-danger">Remove</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <p th:if="${#lists.isEmpty(courseFeedback)}" style="color:var(--rs-muted);font-size:0.9rem;margin-bottom:2rem;">No course feedback yet.</p>
        <h2 class="ad-h2">Instructor feedback</h2>
        <div class="ad-table-wrap" th:if="${not #lists.isEmpty(instructorFeedback)}">
          <table class="ad-table">
            <thead><tr><th>Instructor</th><th>Rating</th><th>Comments</th><th></th></tr></thead>
            <tbody>
              <tr th:each="f : ${instructorFeedback}">
                <td th:text="${f.instructor != null ? f.instructor.name : '—'}">—</td>
                <td th:text="${f.rating}">0</td>
                <td th:text="${f.comments}">—</td>
                <td>
                  <form th:action="@{/manager/feedback/instructor/{id}/delete(id=${f.id})}" method="post" style="margin:0;">
                    <button type="submit" class="ad-btn ad-btn-danger">Remove</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <p th:if="${#lists.isEmpty(instructorFeedback)}" style="color:var(--rs-muted);font-size:0.9rem;">No instructor feedback yet.</p>
      </div>
    </div>
  </div>
</body>
</html>
