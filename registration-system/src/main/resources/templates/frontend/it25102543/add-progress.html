<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/frontend/it25102543/subsystem.css}">
    <title>Log Student Progress</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; margin: 0; }
        .container { padding: 40px; max-width: 600px; margin: 50px auto; background: #242424; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        label { display: block; margin-top: 15px; color: #ffc107; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; font-size: 16px; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
<nav style="background-color: #333; padding: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
    <a href="/register" style="color: white; margin: 0 10px; text-decoration: none;">Register</a>
    <a href="/students" style="color: white; margin: 0 10px; text-decoration: none;">Students</a>
    <a href="/instructors" style="color: white; margin: 0 10px; text-decoration: none;">Instructors</a>
    <a href="/vehicles" style="color: white; margin: 0 10px; text-decoration: none;">Vehicles</a>
    <a href="/lessons" style="color: white; margin: 0 10px; text-decoration: none;">Schedule</a>
    <a href="/packages" style="color: white; margin: 0 10px; text-decoration: none;">Packages</a>

    <a href="/bookLesson" style="color: #28a745; margin: 0 10px; text-decoration: none; font-weight: bold;">+ Book Lesson</a>

    <span style="border-left: 1px solid #555; margin: 0 15px; padding-left: 15px;"></span>
    <a href="/my-progress" style="color: #007bff; margin: 0 10px; text-decoration: none;">My Progress</a>
    <a href="/login" style="color: #ffc107; margin: 0 10px; text-decoration: none; font-weight: bold; border: 1px solid #ffc107; padding: 5px 10px; border-radius: 4px;">Student Login</a>
    <a href="/logout" style="color: #dc3545; margin: 0 10px; text-decoration: none; font-size: 0.9em;">Logout</a>
    <a href="/addProgress" style="color: white; margin: 0 10px; text-decoration: none;">+ Log Progress</a>
</nav>

<div class="container">
    <h2>Instructor: Log Student Progress</h2>
    <form th:action="@{/saveProgress}" th:object="${progressNote}" method="post">
        <label>Select Student:</label>
        <select th:field="*{student}" required>
            <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name}"></option>
        </select>

        <label>Lesson Topic:</label>
        <input type="text" th:field="*{lessonTopic}" placeholder="e.g. Parallel Parking, Roundabouts" required>

        <label>Instructor's Observation:</label>
        <textarea th:field="*{instructorNote}" rows="5" placeholder="Enter feedback here..." required></textarea>

        <button type="submit">Save Progress Note</button>
    </form>
</div>
</body>
</html>
