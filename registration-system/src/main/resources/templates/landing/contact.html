<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact Us — RoadSync</title>
  <link rel="stylesheet" th:href="@{/css/roadsync.css}"/>
  <style>
    .rs-contact-grid { display: grid; gap: 1.5rem; max-width: 560px; margin-top: 2rem; }
    .rs-contact-card {
      background: var(--rs-card);
      border: 1px solid var(--rs-border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .rs-contact-card strong { color: var(--rs-teal); display: block; margin-bottom: 0.35rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body class="rs-landing">
  <header th:replace="~{fragments/roadsync :: header('contact')}"></header>

  <main class="rs-main">
    <section class="rs-section" style="padding-top:4rem;">
      <h2>Contact us</h2>
      <p>Reach our team for demos, partnerships, or support. We typically respond within one business day.</p>
      <div class="rs-contact-grid">
        <div class="rs-contact-card">
          <strong>Email</strong>
          <span>hello@roadsync.example.com</span>
        </div>
        <div class="rs-contact-card">
          <strong>Phone</strong>
          <span>+94 (0) 11 555 0140</span>
        </div>
        <div class="rs-contact-card">
          <strong>Office</strong>
          <span>Colombo, Sri Lanka</span>
        </div>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/roadsync :: footer}"></footer>
  <script th:replace="~{fragments/roadsync :: login-dropdown-script}"></script>
</body>
</html>
