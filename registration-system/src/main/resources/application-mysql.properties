# MySQL profile — activate with: spring.profiles.active=mysql
# IntelliJ: Run configuration -> Environment variables -> SPRING_PROFILES_ACTIVE=mysql
# Or VM options: -Dspring.profiles.active=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/driving_school?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Set your MySQL password here, or override with env MYSQL_PASSWORD (see below)
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console not used with MySQL
spring.h2.console.enabled=false
