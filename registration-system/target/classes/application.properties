# Pick up HTML/CSS changes without stale cache while developing
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# DevTools: restarts the app when compiled output under target/classes changes.
# Trigger a build after edits (IDE: Build project / enable automatic build; or: mvn compile)
spring.devtools.restart.enabled=true

# --- Datasource (default profile = H2 in-memory) ---
# For MySQL: set active profile "mysql" (see application-mysql.properties).
# IntelliJ: duplicate Run configuration and add env SPRING_PROFILES_ACTIVE=mysql
# Database tool: View -> Tool Windows -> Database -> + Data Source -> MySQL (localhost, DB driving_school)
spring.datasource.url=jdbc:h2:mem:drivingschool;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# To use MySQL instead, comment the H2 lines above and uncomment/configure below:
# spring.datasource.url=jdbc:mysql://localhost:3306/driving_school
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
