<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/frontend/it25102537/subsystem.css}">
  <title>Driving Packages</title>
  <style>
    body { font-family: Arial; background-color: #1a1a1a; color: white; margin: 0; }
    .package-container { display: flex; justify-content: center; gap: 20px; padding: 50px; flex-wrap: wrap; }
    .package-card { background: #242424; border: 1px solid #444; border-radius: 10px; padding: 30px; width: 250px; text-align: center; }
    .price { font-size: 24px; color: #ffc107; margin: 15px 0; }
    .buy-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #555; }
  </style>
</head>
<body>

<nav style="background-color: #333; padding: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
  <a href="/register" style="color: white; margin: 0 10px; text-decoration: none;">Register</a>
  <a href="/students" style="color: white; margin: 0 10px; text-decoration: none;">Students</a>
  <a href="/instructors" style="color: white; margin: 0 10px; text-decoration: none;">Instructors</a>
  <a href="/vehicles" style="color: white; margin: 0 10px; text-decoration: none;">Vehicles</a>
  <a href="/lessons" style="color: white; margin: 0 10px; text-decoration: none;">Schedule</a>
  <a href="/packages" style="color: white; margin: 0 10px; text-decoration: none;">Packages</a>

  <a href="/bookLesson" style="color: #28a745; margin: 0 10px; text-decoration: none; font-weight: bold;">+ Book Lesson</a>

  <span style="border-left: 1px solid #555; margin: 0 15px; padding-left: 15px;"></span>
  <a href="/my-progress" style="color: #007bff; margin: 0 10px; text-decoration: none;">My Progress</a>
  <a href="/login" style="color: #ffc107; margin: 0 10px; text-decoration: none; font-weight: bold; border: 1px solid #ffc107; padding: 5px 10px; border-radius: 4px;">Student Login</a>
  <a href="/logout" style="color: #dc3545; margin: 0 10px; text-decoration: none; font-size: 0.9em;">Logout</a>
  <a href="/addProgress" style="color: white; margin: 0 10px; text-decoration: none;">+ Log Progress</a>
</nav>

<h2 style="text-align: center; margin-top: 30px;">Choose Your Lesson Package</h2>

<div class="package-container">
  <div class="package-card" th:each="p : ${packages}">
    <h3 th:text="${p.packageName}">Package Name</h3>
    <p th:text="${p.numberOfLessons} + ' Lessons'"></p>
    <div class="price" th:text="'$' + ${p.basePrice}"></div>

    <form th:action="@{/purchase}" method="post">
      <input type="number" name="studentId" placeholder="Enter Your Student ID" required>
      <input type="hidden" name="packageId" th:value="${p.id}">
      <button type="submit" class="buy-btn">Purchase Now</button>
    </form>
  </div>
</div>
</body>
</html>
